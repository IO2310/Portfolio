<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation — Ismaël Ouzani</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter_18pt-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter_18pt-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter_18pt-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter_18pt-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font: 'Inter', -apple-system, sans-serif;
      --dark: #1d1d1f; --muted: #6e6e73; --hint: #aeaeb2;
      --bg: #f5f5f7; --white: #ffffff;
      --blue: #0071e3; --blue2: #0077ed;
      --green: #30d158; --border: rgba(0,0,0,0.08);
      --ease: cubic-bezier(0.16,1,0.3,1);
    }
    body { font-family: var(--font); background: var(--bg); color: var(--dark); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 48px; display: flex; align-items: center; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); }
    .nav-inner { width: 100%; max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .nav-logo { font-size: 15px; font-weight: 600; color: var(--dark); text-decoration: none; }
    .nav-back { font-size: 13px; color: var(--blue); text-decoration: none; }
    .nav-back:hover { opacity: .7; }

    /* MAIN */
    .main { max-width: 960px; margin: 0 auto; padding: 72px 24px 60px; }

    /* HEADER */
    .page-header { margin-bottom: 32px; }
    .page-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--blue); display: block; margin-bottom: 10px; }
    .page-title { font-size: clamp(28px, 5vw, 48px); font-weight: 700; letter-spacing: -.04em; line-height: .95; color: var(--dark); }
    .page-sub { font-size: 15px; color: var(--muted); margin-top: 10px; }

    /* PROGRESS GLOBAL */
    .prog-card { background: var(--white); border-radius: 18px; padding: 24px; margin-bottom: 28px; border: 0.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .prog-label { font-size: 14px; font-weight: 600; color: var(--dark); }
    .prog-pct { font-size: 14px; font-weight: 700; color: var(--blue); }
    .prog-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #5e5ce6); border-radius: 3px; transition: width .6s var(--ease); width: 0%; }
    .prog-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* CERT CARDS */
    .cert { background: var(--white); border-radius: 18px; border: 0.5px solid var(--border); margin-bottom: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .cert-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; transition: background .15s; }
    .cert-head:hover { background: rgba(0,0,0,.02); }
    .cert-left { display: flex; align-items: center; gap: 12px; }
    .cert-icon { font-size: 22px; }
    .cert-info {}
    .cert-name { font-size: 15px; font-weight: 600; color: var(--dark); letter-spacing: -.02em; }
    .cert-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .cert-right { display: flex; align-items: center; gap: 12px; }
    .cert-pct-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(0,113,227,.08); color: var(--blue); }
    .cert-chev { font-size: 18px; color: var(--hint); transition: transform .25s var(--ease); }
    .cert-chev.open { transform: rotate(180deg); }

    /* MINI PROGRESS DANS CERT */
    .cert-prog { height: 3px; background: var(--bg); }
    .cert-prog-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #5e5ce6); transition: width .5s var(--ease); }

    /* ITEMS */
    .cert-body { display: none; padding: 8px 16px 16px; }
    .cert-body.open { display: block; }
    .item { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 12px; cursor: pointer; transition: background .15s; }
    .item:hover { background: var(--bg); }
    .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; background: var(--white); }
    .check.done { background: var(--green); border-color: var(--green); }
    .check-icon { display: none; width: 10px; height: 10px; }
    .check.done .check-icon { display: block; }
    .item-name { font-size: 13px; color: var(--dark); flex: 1; line-height: 1.4; }
    .item-name.done { color: var(--hint); text-decoration: line-through; }
    .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
    .b-theory   { background: rgba(0,0,0,.05); color: var(--muted); }
    .b-workshop { background: rgba(0,113,227,.08); color: var(--blue); }
    .b-lab      { background: rgba(48,209,88,.1); color: #1a7f3c; }
    .b-cert     { background: rgba(255,159,10,.1); color: #b45309; }
    .b-exam     { background: rgba(255,59,48,.08); color: #d70015; }
    .b-review   { background: rgba(0,0,0,.05); color: var(--hint); }
    .divider    { height: 0.5px; background: var(--border); margin: 2px 0; }

    /* MODAL LOGIN */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.35); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); border-radius: 20px; padding: 36px; width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.15); transform: translateY(12px); transition: transform .25s var(--ease); position: relative; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 20px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; }
    .modal-input { width: 100%; padding: 13px 14px; border-radius: 12px; background: var(--bg); border: 0.5px solid var(--border); font-family: var(--font); font-size: 15px; outline: none; margin-bottom: 10px; transition: border-color .2s, box-shadow .2s; }
    .modal-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,.1); background: var(--white); }
    .modal-btn { width: 100%; padding: 13px; border-radius: 12px; background: var(--blue); color: #fff; border: none; font-family: var(--font); font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; }
    .modal-btn:hover { background: var(--blue2); }
    .modal-err { font-size: 13px; color: #d70015; margin-top: 8px; display: none; }

    /* BOUTON ADMIN */
    .admin-trigger { position: fixed; bottom: 20px; right: 20px; background: none; border: none; font-size: 11px; color: var(--hint); cursor: pointer; padding: 6px 10px; border-radius: 8px; }
    .admin-trigger:hover { color: var(--muted); background: rgba(0,0,0,.04); }
    .admin-badge { display: none; position: fixed; bottom: 20px; right: 20px; font-size: 12px; color: #1a7f3c; background: rgba(48,209,88,.1); border: 0.5px solid rgba(48,209,88,.25); padding: 6px 14px; border-radius: 20px; cursor: pointer; }

    @media (max-width: 600px) {
      .main { padding: 64px 16px 40px; }
      .cert-head { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Ismaël Ouzani</a>
    <a href="../projects.html" class="nav-back">← Projets</a>
  </div>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <h2>Accès admin</h2>
    <p>Réservé à Ismaël Ouzani</p>
    <input class="modal-input" type="email" id="loginEmail" placeholder="Email">
    <input class="modal-input" type="password" id="loginPassword" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')seConnecter()">
    <button class="modal-btn" onclick="seConnecter()">Se connecter</button>
    <p class="modal-err" id="loginErr">Identifiants incorrects.</p>
  </div>
</div>

<button class="admin-trigger" id="adminTrigger" onclick="ouvrirModal()">⚙</button>
<button class="admin-badge" id="adminBadge" onclick="seDeconnecter()">✓ Admin · Déconnexion</button>

<div class="main">
  <div class="page-header">
    <span class="page-eyebrow">// Formation</span>
    <h1 class="page-title">Ma progression<br>freeCodeCamp</h1>
    <p class="page-sub">Suivi en temps réel · visible par les recruteurs</p>
  </div>

  <div class="prog-card">
    <div class="prog-row">
      <span class="prog-label">Progression globale</span>
      <span class="prog-pct" id="gPct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="gFill"></div></div>
    <div class="prog-sub" id="gSub">Chargement…</div>
  </div>

  <div id="certList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://wesdqlztqygsljkpjusw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc2RxbHp0cXlnc2xqa3BqdXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTQ4NjYsImV4cCI6MjA5NDU5MDg2Nn0.tMbX4sbHOS8qzsKaa_nRMfLa5CCbqYWfDOH2hc-r8mQ';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CERTS = [
  { id:'html', name:'HTML', icon:'🌐', sections:[
    {id:'h1', name:'Basic HTML', badge:'theory', steps:137},
    {id:'h2', name:'Semantic HTML', badge:'theory', steps:55},
    {id:'h3', name:'Forms and Tables', badge:'theory', steps:53},
    {id:'h4', name:'Accessibility', badge:'theory', steps:55},
  ]},
  { id:'computers', name:'Computers', icon:'💻', sections:[
    {id:'c1', name:'Computer Basics', badge:'theory', steps:16},
  ]},
  { id:'css', name:'CSS', icon:'🎨', sections:[
    {id:'css1', name:'Basic CSS', badge:'theory', steps:122},
    {id:'css2', name:'Design', badge:'theory', steps:23},
    {id:'css3', name:'Absolute and Relative Units', badge:'theory', steps:8},
    {id:'css4', name:'Pseudo Classes and Elements', badge:'theory', steps:74},
    {id:'css5', name:'Colors', badge:'theory', steps:98},
    {id:'css6', name:'Styling Forms', badge:'theory', steps:84},
    {id:'css7', name:'The Box Model', badge:'theory', steps:54},
    {id:'css8', name:'Flexbox', badge:'theory', steps:70},
    {id:'css9', name:'Build a Page of Playing Cards', badge:'cert', steps:1},
    {id:'css10', name:'Typography', badge:'theory', steps:78},
    {id:'css11', name:'Accessibility', badge:'theory', steps:72},
    {id:'css12', name:'Positioning', badge:'theory', steps:88},
    {id:'css13', name:'Attribute Selectors', badge:'theory', steps:71},
    {id:'css14', name:'Build a Book Inventory App', badge:'cert', steps:1},
    {id:'css15', name:'Responsive Design', badge:'theory', steps:37},
    {id:'css16', name:'Build a Technical Documentation Page', badge:'cert', steps:1},
    {id:'css17', name:'Variables', badge:'theory', steps:120},
    {id:'css18', name:'Grid', badge:'theory', steps:91},
    {id:'css19', name:'Build a Product Landing Page', badge:'cert', steps:1},
    {id:'css20', name:'Animations', badge:'theory', steps:139},
    {id:'css21', name:'CSS Review', badge:'review', steps:1},
    {id:'css22', name:'Responsive Web Design Certification Exam', badge:'exam', steps:1},
  ]},
  { id:'js', name:'JavaScript', icon:'⚡', sections:[
    {id:'js1', name:'Variables and Data Types', badge:'theory'},
    {id:'js2', name:'Strings', badge:'theory'},
    {id:'js3', name:'Arrays', badge:'theory'},
    {id:'js4', name:'Objects', badge:'theory'},
    {id:'js5', name:'Functions', badge:'theory'},
    {id:'js6', name:'Conditionals', badge:'theory'},
    {id:'js7', name:'Loops', badge:'theory'},
    {id:'js8', name:'Scope', badge:'theory'},
    {id:'js9', name:'ES6+ and Modern JS Methods', badge:'theory'},
    {id:'js10', name:'Build a Role Playing Game', badge:'workshop'},
    {id:'js11', name:'DOM Manipulation', badge:'theory'},
    {id:'js12', name:'Events', badge:'theory'},
    {id:'js13', name:'Build a Calorie Counter', badge:'workshop'},
    {id:'js14', name:'Build a Rock Paper Scissors Game', badge:'workshop'},
    {id:'js15', name:'Build a Music Player', badge:'workshop'},
    {id:'js16', name:'Build a Date Formatter', badge:'workshop'},
    {id:'js17', name:'Build a Drum Machine', badge:'lab'},
    {id:'js18', name:'Modern Array Methods', badge:'theory'},
    {id:'js19', name:'Build Football Team Cards', badge:'workshop'},
    {id:'js20', name:'Build a Todo App', badge:'workshop'},
    {id:'js21', name:'Build a Decimal to Binary Converter', badge:'workshop'},
    {id:'js22', name:'Debugging Techniques', badge:'theory'},
    {id:'js23', name:'Build a Number Sorter', badge:'workshop'},
    {id:'js24', name:'Build a Statistics Calculator', badge:'workshop'},
    {id:'js25', name:'Build a Spreadsheet', badge:'workshop'},
    {id:'js26', name:'Build a Palindrome Checker', badge:'cert'},
    {id:'js27', name:'Regular Expressions', badge:'theory'},
    {id:'js28', name:'Build a Spam Filter', badge:'workshop'},
    {id:'js29', name:'Build a Number Formatter', badge:'workshop'},
    {id:'js30', name:'Build a Phone Number Validator', badge:'cert'},
    {id:'js31', name:'Fetch and Async/Await', badge:'theory'},
    {id:'js32', name:'Build a Shopping Cart', badge:'workshop'},
    {id:'js33', name:'Build a Platformer Game', badge:'workshop'},
    {id:'js34', name:'Build a Dice Game', badge:'workshop'},
    {id:'js35', name:'Build a fCC Authors Page', badge:'workshop'},
    {id:'js36', name:'Build a fCC Forum Leaderboard', badge:'workshop'},
    {id:'js37', name:'Build a Roman Numeral Converter', badge:'cert'},
    {id:'js38', name:'Build a Telephone Number Validator', badge:'cert'},
    {id:'js39', name:'Build a Cash Register', badge:'cert'},
    {id:'js40', name:'JavaScript Certification Exam', badge:'exam'},
  ]},
];

const TOTAL = CERTS.reduce((a,c)=>a+c.sections.length,0);
let state = {};
let estAdmin = false;

/* ── Supabase : charger la progression ── */
async function charger() {
  try {
    const { data } = await db.from('progression').select('*');
    if (data) data.forEach(r => { state[r.section_id] = r.complete; });
  } catch(e) {}
  render();
}

/* ── Supabase : sauvegarder une section ── */
async function sauvegarder(id, val) {
  try {
    await db.from('progression').upsert({ section_id: id, complete: val }, { onConflict: 'section_id' });
  } catch(e) {}
}

/* ── Auth ── */
async function verifierSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) { estAdmin = true; afficherAdmin(); }
  await charger();
}

function afficherAdmin() {
  document.getElementById('adminTrigger').style.display = 'none';
  document.getElementById('adminBadge').style.display = 'block';
}

function ouvrirModal() { document.getElementById('modalOverlay').classList.add('open'); }
function fermerModal() { document.getElementById('modalOverlay').classList.remove('open'); document.getElementById('loginErr').style.display='none'; }

async function seConnecter() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('loginErr').style.display = 'block'; return; }
  estAdmin = true; fermerModal(); afficherAdmin(); render();
}

async function seDeconnecter() {
  await db.auth.signOut();
  estAdmin = false;
  document.getElementById('adminTrigger').style.display = 'block';
  document.getElementById('adminBadge').style.display = 'none';
}

/* ── Toggle section ── */
async function togItem(id) {
  if (!estAdmin) return;
  state[id] = !state[id];
  await sauvegarder(id, state[id]);
  render();
}

/* ── Toggle cert ouvert/fermé ── */
function togCert(id) {
  state['open_'+id] = !state['open_'+id];
  render();
}

/* ── Render ── */
function render() {
  const list = document.getElementById('certList');
  list.innerHTML = '';
  CERTS.forEach(cert => {
    const done = cert.sections.filter(s => state[s.id]).length;
    const pct  = Math.round(done / cert.sections.length * 100);
    const open = state['open_'+cert.id];
    const div  = document.createElement('div');
    div.className = 'cert';
    div.innerHTML = `
      <div class="cert-head" onclick="togCert('${cert.id}')">
        <div class="cert-left">
          <span class="cert-icon">${cert.icon}</span>
          <div class="cert-info">
            <div class="cert-name">${cert.name}</div>
            <div class="cert-meta">${done} / ${cert.sections.length} sections</div>
          </div>
        </div>
        <div class="cert-right">
          <span class="cert-pct-pill">${pct}%</span>
          <span class="cert-chev${open?' open':''}">›</span>
        </div>
      </div>
      <div class="cert-prog"><div class="cert-prog-fill" style="width:${pct}%"></div></div>
      <div class="cert-body${open?' open':''}">
        ${cert.sections.map((s,i) => `
          ${i > 0 ? '<div class="divider"></div>' : ''}
          <div class="item" onclick="togItem('${s.id}')">
            <div class="check${state[s.id]?' done':''}">
              ${state[s.id] ? '<svg class="check-icon" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>' : ''}
            </div>
            <span class="item-name${state[s.id]?' done':''}">${s.name}${s.steps ? ` <span style="font-size:11px;color:var(--hint)">(${s.steps} steps)</span>` : ''}</span>
            <span class="badge b-${s.badge}">${s.badge}</span>
          </div>
        `).join('')}
      </div>
    `;
    list.appendChild(div);
  });

  /* Global progress */
  const totalDone = CERTS.reduce((a,c) => a + c.sections.filter(s => state[s.id]).length, 0);
  const gPct = Math.round(totalDone / TOTAL * 100);
  document.getElementById('gPct').textContent = gPct + '%';
  document.getElementById('gFill').style.width = gPct + '%';
  document.getElementById('gSub').textContent = totalDone + ' section' + (totalDone > 1 ? 's' : '') + ' terminée' + (totalDone > 1 ? 's' : '') + ' sur ' + TOTAL;
}

verifierSession();
</script>
</body>
</html>
